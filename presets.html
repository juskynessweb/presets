<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title> Presets</title>
        <link rel="stylesheet" href="presets.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="top-bar">
            <h1>Presets</h1>
            <input type="text" id="searchInput" placeholder="Search presets...">
        </div>

        <div class="preset-container" id="presetContainer">
        </div>
            <buton class="close-btn" onclick="goBack()">x</buton>
            <script>
                function goBack() {
                    window.history.back();
                }
            </script>
</script>
        


        <script type="module">

 console.log("SCRIPT IS RUNNING");
 
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyAhCFb8nW5VIo_Kr0r7SQfT-xQKFzmLWLo",
    authDomain: "juskyness.firebaseapp.com",
    projectId: "juskyness",
    storageBucket: "juskyness.firebasestorage.app",
    messagingSenderId: "589340558669",
    appId: "1:589340558669:web:07b472dab2655f6040e304",
    measurementId: "G-HCP98Q17JL"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

function createPresetCard(data) {
  const card = document.createElement("div");
  card.classList.add("preset-card");

  card.innerHTML = `
    <img src="${data.thumbnail}">
    <div class="preset-info">
      <h3>${data.name}</h3>
      <a href="${data.fileURL}" download>🡇</a>
    </div>
  `;

  document.getElementById("presetContainer").appendChild(card);
}
  
  async function loadPresets(){
  const querySnapshot = await getDocs(collection(db, "presets"));

  const container = document.getElementById("presetContainer");

  container.innerHTML = ""; // clear default card

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const card = document.createElement("div");
    card.classList.add("preset-card");

    card.innerHTML = `
      <img src="${data.thumbnail}" />
      <div class="preset-info">
        <h3>${data.name}</h3>
        <a href="${data.fileURL}" download>🡇</a>
      </div>
    `;

    container.appendChild(card);
  });
}

loadPresets();
</script>
       <script>

window.onload = function(){

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("input", function(){

        const cards = document.querySelectorAll(".preset-card");

        cards.forEach(card => {

            const title =
            card.querySelector("h3")
            .textContent
            .toLowerCase();

            const searchValue =
            searchInput.value.toLowerCase();

            if(title.includes(searchValue)){

                card.style.opacity = "1";
                card.style.transform = "scale(1)";

                setTimeout(() => {
                    card.style.display = "";
                }, 10);

            }

            else{

                card.style.opacity = "0";
                card.style.transform = "scale(0.8)";

                setTimeout(() => {
                    card.style.display = "none";
                }, 300);

            }

        });

    });

};

</script>

    </body>
</html>
